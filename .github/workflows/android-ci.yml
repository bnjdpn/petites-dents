name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test & Build Debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Isolate Gradle user home
        shell: bash
        run: |
          set -euo pipefail
          gradle_user_home="$RUNNER_TEMP/gradle-user-home"
          mkdir -p "$gradle_user_home"
          echo "GRADLE_USER_HOME=$gradle_user_home" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v4.4.2; validates the wrapper by default

      - name: Run unit tests
        run: ./gradlew --no-daemon --stacktrace test

      - name: Require executed unit tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' reports < <(find app/build/test-results -type f -name 'TEST-*.xml' -print0)
          if (( ${#reports[@]} == 0 )); then
            echo "::error::Gradle test produced no JUnit report (NO-SOURCE is forbidden)."
            exit 1
          fi
          if ! grep -Eq '<testsuite[^>]* tests="[1-9][0-9]*"' "${reports[@]}"; then
            echo "::error::Gradle test executed zero unit tests."
            exit 1
          fi

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: petites-dents-android-ci-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: warn
          retention-days: 5
