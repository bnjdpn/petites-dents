name: App Store CD

on:
  workflow_dispatch:
    inputs:
      action:
        description: App Store action to run from main
        required: true
        default: status
        type: choice
        options:
          - status
          - contract
          - full_release
          - submit_review

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-app-store-release
  cancel-in-progress: false

jobs:
  app-store:
    name: App Store ${{ github.event.inputs.action }}
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS, ARM64]
    environment: app-store-release
    timeout-minutes: 180
    defaults:
      run:
        working-directory: ios
    env:
      APPLE_RELEASE_BIN: /Users/benjamin/Documents/Apps/bin/apple-release
      PETITES_DENTS_RELEASE_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
      ASC_REVIEW_FIRST_NAME: ${{ secrets.ASC_REVIEW_FIRST_NAME }}
      ASC_REVIEW_LAST_NAME: ${{ secrets.ASC_REVIEW_LAST_NAME }}
      ASC_REVIEW_PHONE_NUMBER: ${{ secrets.ASC_REVIEW_PHONE_NUMBER }}
      ASC_REVIEW_EMAIL_ADDRESS: ${{ secrets.ASC_REVIEW_EMAIL_ADDRESS }}

    steps:
      - name: Checkout dispatched main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up locked Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "4.0.6"
          bundler-cache: true
          working-directory: ios

      - name: Verify self-hosted Xcode profile
        shell: bash
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          set -euo pipefail
          expected_xcode=$'Xcode 26.3\nBuild version 17C519'
          test "$(xcodebuild -version)" = "$expected_xcode"

      - name: Install verified XcodeGen
        shell: bash
        env:
          XCODEGEN_VERSION: "2.46.0"
          XCODEGEN_SHA256: 4d9e34b62172d645eed6457cac13fc222569974098ef4ee9c3368bedf0196806
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/xcodegen-$XCODEGEN_VERSION.zip"
          install_root="$RUNNER_TEMP/xcodegen-$XCODEGEN_VERSION"
          curl --fail --location --silent --show-error --output "$archive" "https://github.com/yonaskolb/XcodeGen/releases/download/$XCODEGEN_VERSION/xcodegen.zip"
          printf '%s  %s\n' "$XCODEGEN_SHA256" "$archive" | shasum -a 256 --check
          rm -rf "$install_root"
          unzip -q "$archive" -d "$install_root"
          xcodegen_bin="$install_root/xcodegen/bin/xcodegen"
          test -x "$xcodegen_bin"
          test "$("$xcodegen_bin" --version)" = "Version: $XCODEGEN_VERSION"
          echo "$install_root/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Validate selected action
        shell: bash
        env:
          SELECTED_ACTION: ${{ github.event.inputs.action }}
        run: |
          set -euo pipefail
          case "$SELECTED_ACTION" in
            status|contract|full_release|submit_review) ;;
            *) printf 'Unsupported action: %s\n' "$SELECTED_ACTION" >&2; exit 1 ;;
          esac

      - name: Verify shared Apple release runtime
        shell: bash
        run: |
          set -euo pipefail
          test -x "$APPLE_RELEASE_BIN"
          "$APPLE_RELEASE_BIN" doctor --live --json

      - name: Generate Xcode project for full release
        if: github.event.inputs.action == 'full_release'
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: xcodegen generate

      - name: Verify release contract
        if: github.event.inputs.action == 'contract'
        shell: bash
        run: |
          set -euo pipefail
          "$APPLE_RELEASE_BIN" run petites-dents -- /bin/zsh -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/ios"
            bundle exec fastlane release_contract
          '

      - name: Read App Store status
        if: github.event.inputs.action == 'status'
        shell: bash
        run: |
          set -euo pipefail
          "$APPLE_RELEASE_BIN" run petites-dents -- /bin/zsh -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/ios"
            bundle exec fastlane asc_status
          '

      - name: Run full App Store release
        if: github.event.inputs.action == 'full_release'
        shell: bash
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: |
          set -euo pipefail
          "$APPLE_RELEASE_BIN" run petites-dents -- /bin/zsh -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/ios"
            bundle exec fastlane release_quick
          '

      - name: Submit App Store release for review
        if: github.event.inputs.action == 'submit_review'
        shell: bash
        run: |
          set -euo pipefail
          "$APPLE_RELEASE_BIN" run petites-dents -- /bin/zsh -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/ios"
            bundle exec fastlane submit_review
          '
