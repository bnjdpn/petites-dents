name: PetitesDents

options:
  bundleIdPrefix: com.bnjdpn
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    DEVELOPMENT_TEAM: 767SX34A7Z
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  PetitesDents:
    type: application
    platform: iOS
    sources:
      - path: PetitesDents
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Petites Dents
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait
        MARKETING_VERSION: 1.0.3
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.petitesdents

  PetitesDentsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetitesDentsTests
    dependencies:
      - target: PetitesDents
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.petitesdents.tests

  PetitesDentsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetitesDentsUITests
    dependencies:
      - target: PetitesDents
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bnjdpn.petitesdents.uitests
        TEST_TARGET_NAME: PetitesDents

schemes:
  PetitesDents:
    build:
      targets:
        PetitesDents: all
    run:
      storeKitConfiguration: PetitesDents/Resources/PetitesDents.storekit
    test:
      targets:
        - PetitesDentsTests
        - PetitesDentsUITests
